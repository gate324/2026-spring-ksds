<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인터뷰 환경 (응답자용)</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    
    <link rel="stylesheet" href="style.css"> 
    <link rel="stylesheet" href="respondent.css"> 
</head>
<body style="margin: 0; padding: 0; overflow: hidden; background-color: #000;">
    <div class="panorama-container" style="width: 100vw; height: 100vh; position: relative;">
        <div id="respondentLoading" class="image-loading" style="display: none; position: absolute; inset: 0; z-index: 999; background: rgba(255,255,255,0.8); flex-direction: column; align-items: center; justify-content: center; gap: 10px;">
            <div class="spinner"></div>
            <span style="font-size: 13px; color: #4b5563;">장면을 그리는 중이에요…</span>
        </div>
        <div class="panorama-info-overlay expandable-section always-open" style="position: absolute; top: 24px; left: 24px; width: 340px; z-index: 1000;">
            <div class="overlay-glass">
                <div class="section-header">
                    <h4><i class="fas fa-info-circle"></i> 현재 상황</h4>
                </div>
                <div class="section-content" style="padding-top: 8px;">
                    <div style="border-radius: 8px; overflow: hidden; margin-bottom: 12px; display: none;" id="respondentCartoonContainer">
                        <img id="respondentCartoonImg" src="" alt="상황 일러스트" style="width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block;">
                    </div>
                    <p id="respondentNarrative" style="font-size: 14px; line-height: 1.6; margin: 0;">상황 내러티브가 여기에 표시됩니다.</p>
                </div>
            </div>
        </div>

        <div class="panorama-info-overlay expandable-section hover-target" style="position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); width: 80%; max-width: 800px; z-index: 1000;">
            <div class="overlay-glass" style="text-align: center;">  
                <div class="section-header" style="position: relative; justify-content: center;">
                    <h3 style="margin: 0; font-size: 18px; color: #f8fafc;">
                        <i class="fas fa-comment-dots" style="margin-right: 6px;"></i>인터뷰 질문
                    </h3>
                    <i class="fas fa-chevron-up toggle-icon" style="position: absolute; right: 10px; margin: 0;"></i>
                </div>
                <div class="section-content">
                    <p id="respondentQuestion" style="font-size: 22px; font-weight: 700; line-height: 1.5; margin: 10px 0 0 0; color: #fff; text-align: center; word-break: keep-all;">
                        잠시만 기다려주세요. 질문을 준비하고 있습니다.
                    </p>
                </div>
            </div>
        </div>

        <div class="respondent-rotation-controls" aria-label="카메라 자동 회전 제어">
            <button id="rotationPlayBtn" type="button" class="rotation-btn is-active" aria-pressed="true">
                <i class="fas fa-play"></i>
                <span>재생</span>
            </button>
            <button id="rotationStopBtn" type="button" class="rotation-btn" aria-pressed="false">
                <i class="fas fa-stop"></i>
                <span>정지</span>
            </button>
        </div>

        <div id="panoramaViewer" style="width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1;"></div>
    </div>
    <script src="respondent.js"></script>
</body>
</html>
